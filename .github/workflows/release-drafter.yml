name: Release Drafter

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  draft:
    name: Draft Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pull the shared release-drafter config from gofiber/.github so release
      # notes stay consistent with the rest of the org.
      - name: Checkout shared release-drafter config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: gofiber/.github
          sparse-checkout: .github/release-drafter.yml
          sparse-checkout-cone-mode: false
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
