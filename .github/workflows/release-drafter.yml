name: Release Drafter

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  draft:
    name: Draft Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pull the shared release-drafter config from gofiber/.github so release
      # notes stay consistent with the rest of the org.
      - name: Checkout shared release-drafter config
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: gofiber/.github
          sparse-checkout: .github/release-drafter.yml
          sparse-checkout-cone-mode: false
      - uses: release-drafter/release-drafter@ed4bc48ec97379be2258e7b7ac2624a3e26ab809 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
