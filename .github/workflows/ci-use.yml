name: CI Use

# End-to-end self-test of the locally built action. Runs only when the action
# itself changes so it never pollutes unrelated PRs/issues with the test:*
# fixture labels; real labeling is handled by auto-labeler.yml (central config).
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited, synchronize, ready_for_review, labeled, unlabeled]
    paths:
      - 'src/**'
      - 'dist/**'
      - 'action.yml'
      - '.github/labeler.selftest.yml'
      - '.github/workflows/ci-use.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  action:
    name: Multi Labeler
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./
        with:
          config-path: .github/labeler.selftest.yml
